<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">404 Not Found</title>
    <style id="mainStyle">
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; text-align: center; padding-top: 150px; margin: 0; }
        h1 { font-size: 40px; font-weight: normal; margin: 0 0 10px 0; border-bottom: 1px solid #cccccc; display: inline-block; padding-bottom: 10px; width: 600px; max-width: 90%; }
        p { font-size: 14px; color: #333333; margin: 10px 0 0 0; }
        .hidden-panel { display: none; }
    </style>
</head>
<body>
    <div id="fakePage">
        <h1>404 Not Found</h1>
        <p>nginx/1.26.1</p>
    </div>
    <div id="realPage" class="hidden-panel">
        <div class="container">
            <h1>🛸 智能节点安全管理面板</h1>
            <p>安全防扫描机制已激活。当前页面已对全网完全隐身。</p>

            <div class="card">
                <div class="label">⚡ Cloudflare 接入点物理加速 (本地优选 IP)</div>
                <div class="input-group">
                    <input type="text" id="cfIpInput" placeholder="输入测速得出的优选IP，例如: 104.16.88.9">
                    <button onclick="applyCustomIp()">应用并重组节点</button>
                </div>
                <span style="font-size: 12px; color: #64748b;">留空则默认将你的隧道域名作为连接地址。</span>
            </div>
            <div class="card">
                <div class="label">VLESS 节点链接 (WS 模式)</div>
                <div class="value" id="nodeLink">生成中...</div>
                <button onclick="copyText('nodeLink')">📋 复制节点链接</button>
            </div>
            <div class="card">
                <div class="label">Base64 通用订阅内容</div>
                <div class="value" id="subContent">生成中...</div>
                <button onclick="copyText('subContent')">📋 复制订阅内容</button>
            </div>
            <div class="footer">Powered by Xray-core & Cloudflare Tunnel (QUIC Mode)</div>
        </div>
    </div>
    <script>
        const uuid = "UUID_PLACEHOLDER";
        const wsPath = "/ws-node";
        const currentHost = window.location.host;

        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.has('mirror')) {
            document.getElementById('fakePage').style.display = 'none';
            document.getElementById('realPage').style.display = 'block';
            document.getElementById('pageTitle').innerText = '🛸 智能节点订阅管理面板';

            const style = document.getElementById('mainStyle');
            style.innerHTML = `
                body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; padding: 40px 20px; display: flex; justify-content: center; text-align: left; }
                .container { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); max-width: 650px; width: 100%; }
                h1 { font-size: 24px; color: #38bdf8; margin: 0 0 10px 0; border: none; padding: 0; width: auto; }
                p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
                .card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-bottom: 20px; }
                .label { font-weight: 600; font-size: 14px; color: #38bdf8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;}
                .value { font-family: monospace; font-size: 13px; word-break: break-all; background: #1e293b; padding: 12px; border-radius: 6px; border: 1px solid #475569; color: #cbd5e1; max-height: 120px; overflow-y: auto;}
                .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
                input { flex: 1; background: #0f172a; border: 1px solid #475569; border-radius: 6px; padding: 10px; color: white; font-family: monospace; font-size: 14px; }
                button { background-color: #0284c7; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s; }
                button:hover { background-color: #0369a1; }
                .footer { text-align: center; font-size: 12px; color: #64748b; margin-top: 25px; border-top: 1px solid #334155; padding-top: 15px; }
            `;

            generateLinks(currentHost);
        } else {
            console.log("Welcome to nginx.");
        }

        function generateLinks(connectAddress) {
            const vlessLink = `vless://${uuid}@${connectAddress}:443?encryption=none&security=tls&type=ws&host=${currentHost}&sni=${currentHost}&path=${encodeURIComponent(wsPath)}#Singapore-Node`;
            document.getElementById('nodeLink').innerText = vlessLink;
            document.getElementById('subContent').innerText = btoa(vlessLink);
        }

        function applyCustomIp() {
            const inputVal = document.getElementById('cfIpInput').value.trim();
            if (inputVal) {
                generateLinks(inputVal);
                alert(`连接点已切换至优选 IP: ${inputVal}`);
            } else {
                generateLinks(currentHost);
                alert('已恢复为默认域名。');
            }
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => alert('已成功复制！'));
        }
    </script>
</body>
</html>
